apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: payments
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: identity-service
          image: registry.northwindpay.internal/identity-service:1.0.0
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: northwind-platform-env
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: identity-db
                  key: url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: jwt_secret
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: payments
spec:
  selector:
    app: identity-service
  ports:
    - port: 3001
      targetPort: 3001
